<head>

    <style>
        :root {
            --primary-blue: #0984e3;
            --light-blue: #74b9ff;

            --danger: #d63031;
            --success: #00b894;
            --gold: #fdcb6e;
        }

        body {
            font-family: 'Poppins', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #f5f6fa 0%, #dfe6e9 50%, #74b9ff 100%);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .bg-float {
            position: absolute;
            width: 40px;
            height: 40px;
            background: rgba(116, 185, 255, 0.25);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            animation: floatUpDown 6s ease-in-out infinite alternate;
        }

        @keyframes floatUpDown {
            0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0.3; }
            100% { transform: translateY(-100px) rotate(360deg) scale(1.2); opacity: 0.7; }
        }

        h1 {
            color: var(--primary-blue);
            text-align: center;
            font-size: 2.3rem;
            margin-bottom: 5px;
            text-shadow: 0 4px 10px rgba(9, 132, 227, 0.15);
            font-weight: 900;
            z-index: 2;
        }

        .sub-title { color: #636e72; margin-bottom: 25px; text-align: center; font-weight: bold; z-index: 2; }

        #fx-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }

        .setup-screen {
            background: white;
            padding: 35px;
            border-radius: 28px;
            box-shadow: 0 20px 50px rgba(9, 132, 227, 0.1);
            width: 90%;
            max-width: 520px;
            border: 4px solid var(--light-blue);
            text-align: center;
            z-index: 10;
        }

        .player-input-row {
            background: #f1f2f6;
            border: 2px solid #dfe6e9;
            padding: 12px 15px;
            border-radius: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .player-input-row input {
            flex: 1; padding: 10px; border: 2px solid #cbd5e1; border-radius: 10px; font-size: 14px; outline: none; font-weight: bold;
        }

        .avatar-display { font-size: 32px; animation: miniBounce 0.6s infinite alternate; }
        @keyframes miniBounce { from { transform: translateY(0); } to { transform: translateY(-5px); } }

        button {
            background: linear-gradient(135deg, var(--primary-blue), var(--light-blue));
            color: white; border: none; padding: 14px 30px;
            font-size: 16px; font-weight: 800; border-radius: 50px; cursor: pointer;
            box-shadow: 0 8px 15px rgba(9, 132, 227, 0.2); transition: all 0.2s ease;
        }
        button:hover { transform: scale(1.04) translateY(-2px); box-shadow: 0 12px 20px rgba(9, 132, 227, 0.3); }
        .start-btn { width: 100%; margin-top: 10px; background: linear-gradient(135deg, var(--success), #55efc4); }

        .game-screen { display: none; width: 100%; max-width: 1100px; flex-direction: column; align-items: center; z-index: 5; }

        .board-container {
            width: 100%;
            max-height: 440px;
            overflow-y: auto;
            background: white;
            padding: 15px;
            border-radius: 24px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.06);
            margin-bottom: 25px;
            border: 4px solid var(--primary-blue);
        }

        #board {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 8px;
        }

        .tile {
            aspect-ratio: 1/1;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 6px;
            font-size: 11px;
            font-weight: 900;
            color: var(--primary-blue);
            background: #f8f9fa;
            border: 2px solid #dfe6e9;
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.04);
        }

        .tile:nth-child(even) { background-color: #ffffff; }
        .tile:nth-child(4n+1) { background-color: #e3fafc; border-color: #a5f3fc; }
        .tile:nth-child(4n+3) { background-color: #e8f4fd; border-color: #bfdbfe; }

        .tile-start { background: linear-gradient(to bottom, #dbeafe, var(--light-blue)) !important; color: white !important; }
        .tile-finish { background: linear-gradient(to bottom, var(--gold), #e17055) !important; color: white !important; animation: pulseGlow 0.8s infinite alternate; }
        .tile-zonk { background-color: #ffe3e3 !important; border: 2px dashed var(--danger) !important; color: var(--danger) !important; }
        .tile-bonus { background-color: #e6fffa !important; border: 2px solid var(--accent-cyan) !important; color: var(--accent-cyan) !important; }

        @keyframes pulseGlow { from { transform: scale(1); } to { transform: scale(1.05); } }

        .token-space { display: flex; flex-wrap: wrap; gap: 2px; justify-content: center; align-items: center; min-height: 25px; }
        
        .pion {
            font-size: 24px;
            animation: superBounce 0.4s infinite alternate;
            filter: drop-shadow(0 3px 3px rgba(0,0,0,0.15));
        }

        @keyframes superBounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }

        .game-panel {
            background: white;
            padding: 20px; border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); width: 100%; max-width: 600px;
            text-align: center; border: 2px solid #dfe6e9;
        }

        .turn-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .turn-indicator { font-size: 16px; font-weight: 800; padding: 10px 22px; border-radius: 30px; color: white; }

        .timer-box {
            font-size: 22px; font-weight: 900; color: #2d3436;
            background: #dfe6e9; padding: 8px 20px; border-radius: 50px;
            display: flex; align-items: center; gap: 6px;
        }
        .timer-urgent { background: var(--danger) !important; color: white !important; animation: shakeUrgent 0.15s infinite; }

        @keyframes shakeUrgent { 0% { transform: translate(1px, 1px); } 100% { transform: translate(-1px, -1px); } }

        .dice-container { perspective: 600px; margin: 10px auto; width: 75px; height: 75px; }
        .dice {
            width: 100%; height: 100%; position: relative; transform-style: preserve-3d;
            transition: transform 0.5s ease; cursor: pointer;
        }
        .dice-face {
            position: absolute; width: 75px; height: 75px; background: white;
            border: 4px solid var(--primary-blue); border-radius: 16px; display: flex;
            justify-content: center; align-items: center; font-size: 32px; font-weight: 900;
            color: var(--primary-blue);
            box-shadow: inset 0 0 10px rgba(9, 132, 227, 0.1), 0 5px 10px rgba(0,0,0,0.05);
        }
        .face-1 { transform: rotateY(0deg) translateZ(37px); }
        .face-2 { transform: rotateX(180deg) translateZ(37px); }
        .face-3 { transform: rotateY(90deg) translateZ(37px); }
        .face-4 { transform: rotateY(-90deg) translateZ(37px); }
        .face-5 { transform: rotateX(90deg) translateZ(37px); }
        .face-6 { transform: rotateX(-90deg) translateZ(37px); }
        
        .rolling { animation: crazySpin 0.4s infinite linear; }
        @keyframes crazySpin { 0% { transform: rotateX(0deg) rotateY(0deg); } 100% { transform: rotateX(360deg) rotateY(360deg); } }

        .quiz-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(9, 132, 227, 0.25); backdrop-filter: blur(8px); z-index: 100;
            justify-content: center; align-items: center;
        }
        .quiz-modal {
            background: white; padding: 30px; border-radius: 24px; max-width: 580px; width: 90%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15); border: 4px solid var(--primary-blue);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.15);
        }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .category-badge { background: #e3fafc; color: var(--primary-blue); padding: 5px 14px; border-radius: 30px; font-size: 12px; font-weight: 800; }

        .opt-btn {

            border: 2px solid #dfe6e9; border-radius: 12px; font-size: 14px; font-weight: 700;
            transition: all 0.2s;
        }
        .opt-btn:hover { background: #e8f4fd; border-color: var(--primary-blue); }
    </style>
</head>

let audioCtx = null;

function initAudioEngine() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function mainkanSFX(tipe) {
    initAudioEngine();
    if (!audioCtx) return;
    
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);

    if (tipe === 'dice') {
        osc.type = 'triangle'; osc.frequency.setValueAtTime(180, audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(800, audioCtx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.25, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    } else if (tipe === 'correct') {
        osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
        osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); 
        osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2); 
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    } else if (tipe === 'wrong') {
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(60, audioCtx.currentTime + 0.4);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    } else if (tipe === 'tick') {
        osc.type = 'sine'; osc.frequency.setValueAtTime(900, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.04);
    }
}

function initSetup() {
    const container = document.getElementById("player-inputs-container");
    container.innerHTML = "";
    for (let i = 1; i <= 4; i++) {
        const row = document.createElement("div");
        row.className = "player-input-row";
        row.innerHTML = `
            <span class="avatar-display">${hewanAvatar[i-1].split(" ")[0]}</span>
            <input type="text" id="p${i}-name" value="${i <= 2 ? 'Pemain ' + i : ''}" placeholder="Nama Pemain ${i}">
        `;
        container.appendChild(row);
    }
}

function startGame() {
    dataPemain = [];
    for (let i = 1; i <= 4; i++) {
        const nama = document.getElementById(`p${i}-name`).value.trim();
        if (nama !== "") {
            dataPemain.push({
                id: i, nama: nama, avatar: hewanAvatar[i-1].split(" ")[0], posisi: 1, warna: warnaPemain[i-1]
            });
        }
    }
    if (dataPemain.length < 1) { alert("Isi minimal satu nama pemain!"); return; }

    initAudioEngine();
    document.getElementById("setup-screen").style.display = "none";
    document.getElementById("game-screen").style.display = "flex";
    gameAktif = true;
    buatPapanVisual();
    updateTurnIndicator();
}

function buatPapanVisual() {
    const boardEl = document.getElementById("board"); boardEl.innerHTML = "";
    for (let i = 1; i <= TOTAL_PETAK; i++) {
        const tile = document.createElement("div");
        tile.className = "tile";
        if (i === 1) tile.classList.add("tile-start");
        if (i === TOTAL_PETAK) tile.classList.add("tile-finish");
        
        let teksLabel = i;
        if (tipePetak[i]) {
            tile.classList.add(tipePetak[i].tipe === "bonus" ? "tile-bonus" : "tile-zonk");
            teksLabel = tipePetak[i].label;
        }
        tile.innerHTML = `<div>${teksLabel}</div><div class="token-space" id="tile-${i}-tokens"></div>`;
        boardEl.appendChild(tile);
    }
    taruhPionPemain();
}

function taruhPionPemain() {
    for (let i = 1; i <= TOTAL_PETAK; i++) document.getElementById(`tile-${i}-tokens`).innerHTML = "";
    dataPemain.forEach(p => {
        const span = document.createElement("span"); span.className = "pion"; span.innerText = p.avatar;
        document.getElementById(`tile-${p.posisi}-tokens`).appendChild(span);
    });
}

function startTimer(durasi, callbackTimeout) {
    clearInterval(hitungMundur);
    sisaWaktu = durasi;
    updateTimerUI();

    hitungMundur = setInterval(() => {
        sisaWaktu--;
        updateTimerUI();
        if (sisaWaktu <= 5 && sisaWaktu > 0) mainkanSFX('tick');

        if (sisaWaktu <= 0) {
            clearInterval(hitungMundur);
            callbackTimeout();
        }
    }, 1000);
}

function updateTimerUI() {
    const tBox = document.getElementById("timer-display");
    document.getElementById("timer-num").innerText = sisaWaktu;
    if(document.getElementById("modal-timer")) {
        document.getElementById("modal-timer").innerText = `⏱️ ${sisaWaktu}s`;
    }
    if (sisaWaktu <= 6) tBox.classList.add("timer-urgent");
    else tBox.classList.remove("timer-urgent");
}

function updateTurnIndicator() {
    const pAktif = dataPemain[indeksTurn];
    const box = document.getElementById("current-turn-box");
    box.innerText = `Giliran: ${pAktif.nama} ${pAktif.avatar}`;
    box.style.backgroundColor = pAktif.warna;
    document.getElementById("game-info-msg").innerText = "Ayo kocok dadumu!";
    
    startTimer(15, () => {
        mainkanSFX('wrong');
        alert(`⏱️ Waktu habis! ${pAktif.nama} terlalu lama berpikir. Giliran dilewati.`);
        pindahGiliran();
    });
}

function rollDice() {
    if (!gameAktif || !daduBisaDikocok) return;
    daduBisaDikocok = false;
    clearInterval(hitungMundur);

    mainkanSFX('dice');
    const dice = document.getElementById("visual-dice");
    dice.classList.add("rolling");
    
    angkaDaduSekarang = Math.floor(Math.random() * 6) + 1;

    setTimeout(() => {
        dice.classList.remove("rolling");
        document.getElementById("game-info-msg").innerText = `${dataPemain[indeksTurn].nama} mendapatkan angka ${angkaDaduSekarang}!`;
        setTimeout(bukaModalKuis, 600);
    }, 700);
}

function bukaModalKuis() {
    const pAktif = dataPemain[indeksTurn];
    const idxSoal = Math.min(pAktif.posisi - 1, bankPertanyaan.length - 1);
    const kuis = bankPertanyaan[idxSoal];

    document.getElementById("quiz-category").innerText = kuis.kategori;
    document.getElementById("active-player-name").innerText = `KUIS PETAK ${pAktif.posisi} - TARGET ${pAktif.nama.toUpperCase()}`;
    document.getElementById("quiz-question").innerText = kuis.pertanyaan;

    const boxOpsi = document.getElementById("quiz-options");
    boxOpsi.innerHTML = "";
    kuis.pilihan.forEach((pil, idx) => {
        const b = document.createElement("button"); b.className = "opt-btn"; b.innerText = pil;
        b.onclick = () => verifikasiJawaban(idx, kuis.jawaban);
        boxOpsi.appendChild(b);
    });

    document.getElementById("quiz-overlay").style.display = "flex";

    startTimer(30, () => {
        document.getElementById("quiz-overlay").style.display = "none";
        mainkanSFX('wrong');
        pAktif.posisi = Math.max(1, pAktif.posisi - 3);
        taruhPionPemain();
        alert(`🚨 WAKTU HABIS! Hukuman: Mundur 3 petak!`);
        pindahGiliran();
    });
}

function verifikasiJawaban(pilihanUser, pilihanBenar) {
    clearInterval(hitungMundur);
    document.getElementById("quiz-overlay").style.display = "none";
    const pAktif = dataPemain[indeksTurn];

    if (pilihanUser === pilihanBenar) {
        mainkanSFX('correct');
        pAktif.posisi += angkaDaduSekarang;
        if (pAktif.posisi > TOTAL_PETAK) pAktif.posisi = TOTAL_PETAK;
        alert(`✅ JAWABAN BENAR! ${pAktif.nama} maju +${angkaDaduSekarang} langkah.`);
        eksekusiPetakEfek(pAktif);
    } else {
        mainkanSFX('wrong');
        pAktif.posisi = Math.max(1, pAktif.posisi - 2);
        alert(`❌ JAWABAN SALAH! Hukuman: Mundur -2 langkah.`);
    }

    taruhPionPemain();

    if (pAktif.posisi >= TOTAL_PETAK) {
        gameAktif = false;
        document.getElementById("game-info-msg").innerHTML = `<span style="color:white; background:var(--success); padding:12px 25px; border-radius:30px; font-size:20px">🏆 JUARA 1: ${pAktif.nama}! 🏆</span>`;
        startKembangApi();
        return;
    }
    pindahGiliran();
}

function eksekusiPetakEfek(p) {
    const efek = tipePetak[p.posisi];
    if (efek) {
        if (efek.tipe === "bonus") {
            p.posisi = Math.min(TOTAL_PETAK, p.posisi + efek.nilai);
            alert(`🚀 BONUS ARENA! Meluncur maju +${efek.nilai} petak!`);
        } else if (efek.tipe === "zonk") {
            p.posisi = Math.max(1, p.posisi - efek.nilai);
            alert(`💥 JEBAKAN ARENA! Terhempas mundur -${efek.nilai} petak!`);
        }
    }
}

function pindahGiliran() {
    indeksTurn = (indeksTurn + 1) % dataPemain.length;
    daduBisaDikocok = true;
    updateTurnIndicator();
}

const canvas = document.getElementById("fx-canvas"); const ctx = canvas.getContext("2d");
let listPartikel = [];
function buatLedakan(x, y) {
    const warna = ["#74b9ff", "#0984e3", "#00cec9", "#fdcb6e", "#ffffff"];
    for(let i=0; i<50; i++) {
        listPartikel.push({
            x: x, y: y, vx: (Math.random() - 0.5) * 10, vy: (Math.random() - 0.5) * 10,
            a: 1, w: warna[Math.floor(Math.random() * warna.length)], s: Math.random() * 3 + 2
        });
    }
}
function loopAnimasi() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for(let i = listPartikel.length - 1; i >= 0; i--) {
        let pt = listPartikel[i]; pt.x += pt.vx; pt.y += pt.vy; pt.vy += 0.05; pt.a -= 0.01;
        if(pt.a <= 0) { listPartikel.splice(i, 1); continue; }
        ctx.globalAlpha = pt.a; ctx.fillStyle = pt.w; ctx.beginPath();
        ctx.arc(pt.x, pt.y, pt.s, 0, Math.PI * 2); ctx.fill();
    }
    if(!gameAktif) requestAnimationFrame(loopAnimasi);
}
function startKembangApi() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    loopAnimasi();
    setInterval(() => { if(!gameAktif) buatLedakan(Math.random() * canvas.width, Math.random() * canvas.height * 0.4); }, 300);
}

initSetup();
</script>
